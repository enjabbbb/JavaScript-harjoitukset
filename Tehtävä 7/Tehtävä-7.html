<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tehtävä 7</title>
</head>
<body>
<h1>Dice roller</h1>
<p id='result'></p>
<script>
     const diceamount = parseInt(prompt('How many dice do you want to roll?'));
     const dicesides = parseInt(prompt('How many sides do the dice have?'));
        let sum = 0;
        for (let i = 0; i < diceamount; i++) {
            const roll = Math.floor(Math.random() * dicesides) + 1;
            sum += roll;
        }
        document.querySelector('#result').textContent = 'Sum of all rolled dice: ' + sum;
    </script>
</body>
</html>
