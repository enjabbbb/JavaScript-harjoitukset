<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Square root calculator</h1>
<p id='result'></p>
<script>
    const calculate = confirm('Should I calculate the square root?');

    if (calculate) {
        const number = prompt('Enter a number:');
        if (number < 0) {
            document.querySelector('#result').textContent = 'Cannot calculate square root of a negative number.';
        } else {
            const sqrt = Math.sqrt(number);
            document.querySelector('#result').textContent = 'The square root of ' + number + ' is ' + sqrt + '.';
        }
    } else {
        document.querySelector('#result').textContent = 'The square root is not calculated.';
    }
</script>
</body>
</html>
